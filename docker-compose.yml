services:
  multisnake:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    environment:
      - ENABLE_DEBUG_COMMANDS=false
      # CSWSH-Schutz: nur WS-Handshakes von diesen Origins akzeptieren (Browser senden
      # immer Origin). Der Default deckt nur lokale Entwicklung ab; die öffentliche
      # Domain gehört als deployment-spezifischer Wert in die nicht-committete VPS-.env
      # (ALLOWED_WS_ORIGINS=https://<domain>), sonst weist der Server echte Spieler ab.
      - ALLOWED_WS_ORIGINS=${ALLOWED_WS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      # Anti-Flut: Obergrenze gleichzeitiger Verbindungen und Nachrichten-Rate je
      # Verbindung (Nachrichten/Sekunde). <=0 => aus.
      - MAX_WS_CONNECTIONS=${MAX_WS_CONNECTIONS:-100}
      - WS_MAX_MSGS_PER_SEC=${WS_MAX_MSGS_PER_SEC:-250}
      # Admin-Debug-Konsole via /admin: die Auth (Passwort) macht Caddy (basic_auth auf
      # /admin). Nur auf true setzen, WENN Caddy /admin schützt - dann setzt /admin ein
      # Admin-Cookie, das die /ws-Verbindung als Admin ausweist. Default false => es wird
      # kein Cookie gesetzt (kein Admin). Auf dem VPS in einer nicht-committeten .env.
      - TRUST_PROXY_ADMIN=${TRUST_PROXY_ADMIN:-false}
      # Optional: fester Signierschlüssel fürs Admin-Cookie, damit Admin-Sessions einen
      # Container-Neustart überleben. Leer => zufällig pro Prozess (Neustart = neu login).
      - ADMIN_COOKIE_SECRET=${ADMIN_COOKIE_SECRET:-}
    mem_limit: 512m
    cpus: 1.0
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
