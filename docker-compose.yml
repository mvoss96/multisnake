services:
  multisnake:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    environment:
      - ENABLE_DEBUG_COMMANDS=false
      # Admin-Debug-Konsole via /admin: die Auth macht Caddy (basic_auth auf /admin*).
      # Nur auf true setzen, WENN Caddy /admin* (inkl. /admin/ws) schützt - dann gelten
      # /admin/ws-Verbindungen als Admin. Default false => Route gewährt keine Admin-
      # Rechte (nicht offen). Auf dem VPS in einer nicht-committeten .env setzen.
      - TRUST_PROXY_ADMIN=${TRUST_PROXY_ADMIN:-false}
    mem_limit: 512m
    cpus: 1.0
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
