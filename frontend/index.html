<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<!-- user-scalable=no: Pinch-Zoom würde mit der Touch-Zieh-Steuerung auf dem Canvas kollidieren. -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>multiSnake</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="hud">
  <div id="score">Score: 0</div>
  <button id="control-toggle" class="hud-btn"></button>
  <div id="dash-ring" title="Dash (Umschalt)">
    <svg class="dash-progress" viewBox="0 0 100 100">
      <circle class="dash-progress-track" cx="50" cy="50" r="44" pathLength="100" transform="rotate(-90 50 50)"></circle>
      <circle class="dash-progress-fill" cx="50" cy="50" r="44" pathLength="100" transform="rotate(-90 50 50)"></circle>
    </svg>
    <!-- Pixel-Theme: der Dash-Ladestand wird als gold-aufsteigende Füllung im
         dunklen Kreis gezeigt (Höhe per JS, siehe updateDashMeter). Nur unter
         body.theme-pixel sichtbar (dann ist der SVG-Ring aus). Gleich für Ring
         + Button. -->
    <div class="dash-fill"></div>
    <span class="dash-icon">⚡</span>
  </div>
</div>

<div id="dash-btn">
  <svg class="dash-progress" viewBox="0 0 100 100">
    <circle class="dash-progress-track" cx="50" cy="50" r="44" pathLength="100" transform="rotate(-90 50 50)"></circle>
    <circle class="dash-progress-fill" cx="50" cy="50" r="44" pathLength="100" transform="rotate(-90 50 50)"></circle>
  </svg>
  <div class="dash-fill"></div>
  <span class="dash-icon">DASH</span>
</div>

<div id="leaderboard">
  <h3>Leaderboard</h3>
  <ol id="leaderboard-list"></ol>
</div>

<!-- Verbindungsabbruch: verdunkelndes Overlay statt dünnem Balken, mit Spinner
     und manuellem Retry (der Client reconnectet automatisch, der Button forciert). -->
<div id="connection-overlay" class="hidden">
  <div class="panel reconnect-card">
    <svg class="reconnect-spin" viewBox="0 0 24 24" width="30" height="30" aria-hidden="true">
      <path d="M12 3 a9 9 0 1 1 -8.5 6" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <h2>Verbindung verloren</h2>
    <p>verbinde neu …</p>
    <button id="reconnect-retry">Erneut versuchen</button>
  </div>
</div>

<div id="name-modal">
  <div class="panel">
    <!-- Vektor-Snake-Maskottchen: passt in beide Themes (Schlangenkörper ist auch
         im Spiel in beiden Themes Vektor). -->
    <svg class="mascot" viewBox="0 0 76 44" width="84" height="49" aria-hidden="true">
      <path d="M8 32 Q 24 6 38 24 T 66 20" fill="none" stroke="#4caf50" stroke-width="9" stroke-linecap="round"/>
      <circle cx="66" cy="20" r="7.5" fill="#4caf50"/>
      <circle cx="68.5" cy="17.5" r="2.2" fill="#0d1b0d"/>
    </svg>
    <h2>multiSnake</h2>
    <p>Gib deinen Namen ein und leg los</p>
    <input id="name-input" type="text" maxlength="20" placeholder="Dein Name" autocomplete="off">
    <!-- Die Theme-Buttons werden dynamisch aus der Registry (themes.js) erzeugt,
         siehe main.js - hier steht nur das Label. -->
    <div class="theme-select">
      <span class="theme-select-label">Design:</span>
    </div>
    <button id="join-btn">Spielen</button>
  </div>
</div>

<div id="game-over-overlay" class="hidden">
  <div class="panel">
    <h2>Game Over</h2>
    <!-- Ergebnis-Karte: großer Score im Fokus, darunter Bestwert + Platzierung,
         Rekord-Badge nur bei neuem Bestwert (per JS ein-/ausgeblendet). -->
    <div class="result">
      <div class="result-label">Dein Score</div>
      <div id="final-score" class="result-score">0</div>
      <div id="go-record" class="record-badge hidden">Neuer Rekord</div>
      <div class="result-stats">
        <span class="stat"><span class="stat-label">Best</span><span id="go-best">0</span></span>
        <span class="stat"><span class="stat-label">Platz</span><span id="go-rank">–</span></span>
      </div>
    </div>
    <div class="theme-select">
      <span class="theme-select-label">Design:</span>
    </div>
    <button id="restart-btn">Neu starten</button>
    <button id="go-changename" class="linklike">Name ändern</button>
  </div>
</div>

<!-- Debug-Konsole: nur eingeblendet, wenn der Server die debug_*-Befehle
     freigeschaltet hat (welcome.debug_enabled, siehe main.js). Toggle per Button
     oder Taste `. Auf dem öffentlichen Deployment (Debug aus) existiert sie nicht. -->
<button id="dbg-toggle" class="hidden" title="Debug-Konsole (Taste `)">🐞</button>
<div id="debug-console" class="hidden">
  <div class="dbg-head"><span>Debug</span><button id="dbg-close" aria-label="schließen">×</button></div>
  <div class="dbg-row">
    <label for="dbg-bots">Bots</label>
    <input id="dbg-bots" type="number" min="0" max="50" step="1" placeholder="0–50">
    <button id="dbg-bots-apply">Setzen</button>
  </div>
  <label class="dbg-check"><input id="dbg-pause" type="checkbox"> Pause</label>
  <label class="dbg-check"><input id="dbg-invuln" type="checkbox"> Unverwundbar (ich)</label>
  <div class="dbg-row">
    <label>Teleport</label>
    <input id="dbg-tx" type="number" placeholder="x">
    <input id="dbg-ty" type="number" placeholder="y">
    <button id="dbg-tp">Go</button>
  </div>
  <div class="dbg-row">
    <button id="dbg-reset">Server-Neustart (Welt zurücksetzen)</button>
  </div>
  <div class="dbg-info" id="dbg-info"></div>
  <div class="dbg-hint">Taste <kbd>^</kbd> zum Ein-/Ausblenden</div>
</div>

<script src="js/config.js"></script>
<script src="js/themes.js"></script>
<script src="js/state.js"></script>
<script src="js/network.js"></script>
<script src="js/input.js"></script>
<script src="js/touch.js"></script>
<script src="js/renderer.js"></script>
<script src="js/main.js"></script>
</body>
</html>
